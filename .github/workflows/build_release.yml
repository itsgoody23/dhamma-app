name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'

      - run: flutter pub get

      # Decode release keystore
      - name: Decode keystore
        if: env.SIGNING_KEYSTORE_BASE64 != ''
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: |
          mkdir -p android/keystore
          echo "$SIGNING_KEYSTORE_BASE64" | base64 -d > android/keystore/dhamma-release.jks

      - name: Write key.properties
        if: env.SIGNING_KEYSTORE_BASE64 != ''
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=$SIGNING_STORE_PASSWORD
          keyPassword=$SIGNING_KEY_PASSWORD
          keyAlias=$SIGNING_KEY_ALIAS
          storeFile=../keystore/dhamma-release.jks
          EOF

      # Extract version from git tag (v1.2.3 → build-name=1.2.3)
      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "name=$TAG" >> "$GITHUB_OUTPUT"
          echo "code=$(echo "$TAG" | tr -d '.' )" >> "$GITHUB_OUTPUT"

      # Android AAB (Play Store)
      - run: flutter build appbundle --release --build-name=${{ steps.version.outputs.name }} --build-number=${{ steps.version.outputs.code }}

      # Android APK (direct download)
      - run: flutter build apk --release --split-per-abi --build-name=${{ steps.version.outputs.name }} --build-number=${{ steps.version.outputs.code }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/bundle/release/app-release.aab
            build/app/outputs/flutter-apk/*.apk
          generate_release_notes: true

  release_ios:
    name: Build iOS Release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'

      - run: flutter pub get

      - run: flutter build ios --release --no-codesign
        # Full signing requires Apple Developer certs — configure in Xcode
