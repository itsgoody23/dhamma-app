name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Analyse & format ────────────────────────────────────────────────────────
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'

      - run: flutter pub get
      - run: flutter gen-l10n
      - run: flutter analyze
      - run: dart format --set-exit-if-changed .

  # ── Unit & widget tests ─────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'

      - run: flutter pub get
      - run: flutter test test/unit/ test/widget/ --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
        continue-on-error: true

  # ── ETL tests (Python) ──────────────────────────────────────────────────────
  etl_test:
    name: ETL Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install -r scripts/etl/requirements.txt
      - run: pytest scripts/etl/tests/ -v

  # ── Android build ───────────────────────────────────────────────────────────
  build_android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'

      - run: flutter pub get
      - run: flutter build apk --release --split-per-abi

      - name: Assert APK size < 30 MB
        run: |
          for apk in build/app/outputs/flutter-apk/*.apk; do
            size=$(du -m "$apk" | cut -f1)
            echo "$apk: ${size} MB"
            if [ "$size" -gt 30 ]; then
              echo "ERROR: $apk exceeds 30 MB limit (${size} MB)"
              exit 1
            fi
          done

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/*.apk

  # ── iOS build ───────────────────────────────────────────────────────────────
  build_ios:
    name: Build iOS
    runs-on: macos-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'

      - run: flutter pub get
      - run: flutter build ios --release --no-codesign

      - uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: build/ios/iphoneos/Runner.app
