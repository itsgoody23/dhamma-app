name: dhamma_app
description: Free, offline-first Pali Canon and Buddhist text study app.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # Database
  drift: ^2.31.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  # State management
  flutter_riverpod: ^3.0.0
  riverpod_annotation: ^4.0.0

  # Navigation
  go_router: ^13.2.0

  # Networking
  dio: ^5.4.3
  http: ^1.2.1
  connectivity_plus: ^6.0.3

  # HTML rendering
  flutter_html: ^3.0.0-beta.2
  html: ^0.15.4

  # Preferences & storage
  shared_preferences: ^2.2.3

  # Fonts & text
  google_fonts: ^6.2.1
  intl: ^0.19.0

  # UI
  shimmer: ^3.0.0
  lottie: ^3.1.0
  cached_network_image: ^3.3.1

  # Sharing & export
  share_plus: ^10.0.0
  pdf: ^3.10.8
  url_launcher: ^6.3.0

  # Crypto
  crypto: ^3.0.3

  # Device / storage info
  device_info_plus: ^10.1.0

  # Background downloads
  workmanager: ^0.9.0

  # ── Phase 2 (uncomment when ready) ──────────────────────────────────────────
  # supabase_flutter: ^2.5.0

  # ── Phase 3 (uncomment when ready) ──────────────────────────────────────────
  # just_audio: ^0.9.39
  # audio_session: ^0.1.21
  # audio_service: ^0.18.15
  # youtube_player_flutter: ^8.1.2
  # youtube_explode_dart: ^2.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  drift_dev: ^2.31.0
  build_runner: ^2.12.0
  riverpod_generator: ^4.0.0
  # custom_lint and riverpod_lint are incompatible with drift_dev ^2.32.0 — re-enable when versions align
  flutter_lints: ^4.0.0
  mocktail: ^1.0.3

flutter:
  uses-material-design: true

  assets:
    - assets/db/dhamma_seed.db
    - assets/reading_plans/plans.json
    - assets/images/

  fonts:
    - family: NotoSerif
      fonts:
        - asset: assets/fonts/NotoSerif-Regular.ttf
        - asset: assets/fonts/NotoSerif-Bold.ttf
          weight: 700
        - asset: assets/fonts/NotoSerif-Italic.ttf
          style: italic
    - family: NotoSerifSinhala
      fonts:
        - asset: assets/fonts/NotoSerifSinhala-Regular.ttf
