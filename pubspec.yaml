name: dhamma_app
description: Free, offline-first Pali Canon and Buddhist text study app.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Database
  drift: ^2.31.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  # State management
  flutter_riverpod: ^3.0.0
  riverpod_annotation: ^4.0.0

  # Navigation
  go_router: ^13.2.0

  # Networking
  dio: ^5.4.3
  http: ^1.2.1
  connectivity_plus: ^6.0.3

  # HTML rendering
  flutter_html: ^3.0.0-beta.2
  html: ^0.15.4

  # Preferences & storage
  shared_preferences: ^2.2.3

  # Fonts & text
  google_fonts: ^6.2.1
  intl: ^0.20.2

  # UI
  shimmer: ^3.0.0
  lottie: ^3.1.0
  cached_network_image: ^3.3.1

  # Sharing & export
  share_plus: ^10.0.0
  pdf: ^3.10.8
  url_launcher: ^6.3.0
  screenshot: ^3.0.0

  # Text-to-Speech
  flutter_tts: ^4.2.0

  # Crypto
  crypto: ^3.0.3

  # Device / storage info
  device_info_plus: ^10.1.0

  # Background downloads
  workmanager: ^0.9.0

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0

  # ── Phase 2: Auth + Sync ────────────────────────────────────────────────────
  supabase_flutter: ^2.5.0
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.0

  # ── Phase 4: Personal Translation Layer ─────────────────────────────────────
  file_picker: ^8.0.0

  # ── Phase 3: Audio / Video ──────────────────────────────────────────────────
  just_audio: ^0.9.39
  just_audio_windows: ^0.2.0
  audio_session: ^0.1.21
  audio_service: ^0.18.15
  youtube_player_flutter: ^9.1.3
  youtube_explode_dart: ^2.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  drift_dev: ^2.31.0
  build_runner: ^2.12.0
  riverpod_generator: ^4.0.0
  # custom_lint and riverpod_lint are incompatible with drift_dev ^2.32.0 — re-enable when versions align
  flutter_lints: ^4.0.0
  mocktail: ^1.0.3
  flutter_launcher_icons: ^0.14.3

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/db/dhamma_seed.db
    - assets/db/dhamma_dictionary.db
    - assets/reading_plans/plans.json
    - assets/images/
    - assets/audio/chanting_manifest.json
    - assets/audio/meditation_manifest.json
    - assets/audio/talks_manifest.json
    - assets/data/parallels.json

  fonts:
    - family: NotoSerif
      fonts:
        - asset: assets/fonts/NotoSerif-Regular.ttf
        - asset: assets/fonts/NotoSerif-Bold.ttf
          weight: 700
        - asset: assets/fonts/NotoSerif-Italic.ttf
          style: italic
    - family: NotoSerifSinhala
      fonts:
        - asset: assets/fonts/NotoSerifSinhala-Regular.ttf

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon/dhamma_wheel.png"
  adaptive_icon_background: "#4A7C59"
  adaptive_icon_foreground: "assets/icon/dhamma_wheel_square.png"
  min_sdk_android: 21
  web:
    generate: false
  windows:
    generate: false
